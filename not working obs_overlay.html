.wrap{position:relative;z-index:1;width:100vw;height:100vh;background:transparent;border:3px solid transparent;border-image:var(--grad) 1;display:flex;flex-direction:column;overflow:hidden;}
.inner{flex:1;display:flex;flex-direction:column;padding:1.2% 1.5%;min-height:0;}
.title{font-family:'Bebas Neue',cursive;font-size:clamp(1.4rem,3.2vw,3rem);background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;letter-spacing:0.08em;margin-bottom:0.6%;flex-shrink:0;}
.round-bar{display:flex;align-items:center;justify-content:center;gap:1.2rem;margin-bottom:1%;flex-shrink:0;}
.nav-btn{background:none;border:1px solid rgba(255,255,255,0.25);color:var(--accent);border-radius:50%;width:clamp(22px,2.5vw,38px);height:clamp(22px,2.5vw,38px);font-size:clamp(0.8rem,1.5vw,1.2rem);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.nav-btn:hover:not(:disabled){background:rgba(0,212,255,0.15);}
.nav-btn:disabled{opacity:0.2;cursor:default;}
.round-label{font-family:'Bebas Neue',cursive;font-size:clamp(0.9rem,1.6vw,1.5rem);color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;}
.grid{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:1%;flex:1;min-height:0;}
.card{background:var(--slate);border:1px solid var(--border);border-radius:10px;overflow:visible;display:flex;flex-direction:column;min-height:0;}
.card-hdr{background:var(--court);padding:1.5% 3%;display:flex;align-items:center;gap:0.5rem;flex-shrink:0;}
.card-hdr span{font-family:'Bebas Neue',cursive;font-size:clamp(0.9rem,1.8vw,1.6rem);color:white;letter-spacing:0.05em;}
.card-body{flex:1;display:flex;align-items:stretch;padding:2% 2% 3%;gap:2%;min-height:0;overflow:hidden;}
.team{flex:1;display:flex;flex-direction:column;gap:3%;justify-content:space-between;position:relative;}
.team-label{font-family:'Bebas Neue',cursive;font-size:clamp(0.75rem,1.4vw,1.2rem);text-transform:uppercase;letter-spacing:0.12em;color:var(--muted);margin-bottom:4%;}
.prow{display:flex;align-items:center;justify-content:space-between;gap:2%;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:6px;padding:3% 4%;}
.pname{font-size:clamp(0.6rem,1.1vw,1rem);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;max-width:calc(100% - 3em);}
.pname.absent{color:var(--muted);font-style:italic;}
.pscore{font-family:'Bebas Neue',cursive;font-size:clamp(0.8rem,1.6vw,1.4rem);min-width:2.4em;width:2.4em;text-align:center;flex-shrink:0;color:var(--accent);}
.vs{font-family:'Bebas Neue',cursive;font-size:clamp(0.9rem,1.8vw,1.6rem);color:var(--muted);display:flex;align-items:center;justify-content:center;align-self:center;flex-shrink:0;padding:0 1%;}
.total-row{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);padding-top:4%;margin-top:3%;}
.total-lbl{font-size:clamp(0.5rem,0.8vw,0.75rem);text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);}
.total-val{font-family:'Bebas Neue',cursive;font-size:clamp(0.85rem,1.5vw,1.3rem);}
.pts{font-family:'Bebas Neue',cursive;font-size:clamp(1rem,2.2vw,2rem);text-align:right;line-height:1;margin-top:1%;}
.pts span{font-size:0.55em;}
.result{text-align:center;font-family:'Bebas Neue',cursive;font-size:clamp(1rem,2vw,1.7rem);letter-spacing:0.08em;border-top:1px solid var(--border);padding:2% 0 1%;margin-top:0;flex-shrink:0;position:relative;z-index:10;background:var(--slate);}
.trophy{position:absolute;right:-4%;top:50%;transform:translateY(-50%);font-size:clamp(2.5rem,5vw,4.5rem);opacity:0.12;pointer-events:none;z-index:0;line-height:1;}
.confetti-canvas{position:absolute;top:0;left:0;width:100%;height:70%;pointer-events:none;z-index:1;overflow:visible;}
.status-bar{position:fixed;bottom:8px;right:12px;font-size:0.7rem;color:var(--muted);display:flex;align-items:center;gap:6px;z-index:10;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--win);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
.play-btn{background:var(--grad);border:none;color:#fff;border-radius:20px;padding:5px 16px;font-family:'Bebas Neue',cursive;font-size:clamp(0.75rem,1.3vw,1.05rem);letter-spacing:0.08em;cursor:pointer;transition:opacity 0.15s;flex-shrink:0;}
.play-btn:hover{opacity:0.82;}
.court-ind{font-family:'Bebas Neue',cursive;font-size:clamp(0.7rem,1.2vw,0.95rem);color:var(--accent);letter-spacing:0.1em;min-width:5.5em;text-align:center;display:none;}
.grid.single{grid-template-columns:1fr;grid-template-rows:1fr;}
.grid.single .card{border-radius:14px;overflow:hidden;display:flex;flex-direction:column;}
.grid.single .card-hdr{padding:0.8% 2%;flex-shrink:0;}
.grid.single .card-hdr span{font-size:clamp(1.1rem,2.4vw,2rem);}
.grid.single .card-body{padding:1% 1.5%;gap:1%;flex:1;min-height:0;overflow:hidden;}
.grid.single .team{gap:2%;min-width:0;overflow:hidden;}
.grid.single .prow{padding:4.5% 3%;overflow:hidden;min-width:0;}
.grid.single .pname{font-size:clamp(1.6rem,3.5vw,3.2rem);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0;}
.grid.single .pscore{font-size:clamp(1.8rem,4vw,3.8rem);min-width:2em;width:2em;}
.grid.single .total-row{padding-top:2%;margin-top:1%;}
.grid.single .total-lbl{font-size:clamp(0.6rem,1vw,0.9rem);}
.grid.single .total-val{font-size:clamp(1rem,1.8vw,1.6rem);}
.grid.single .pts{font-size:clamp(1.4rem,3vw,2.8rem);}
.grid.single .result{font-size:clamp(1.2rem,2.6vw,2.4rem);padding:0.6% 0;}
.grid.single .team-label{font-size:clamp(1.2rem,2.4vw,2.2rem);margin-bottom:2%;}
</style>
</head>
<body>
<div class="wrap">
  <div class="inner">
    <div class="title">AMERICANO COURTS</div>
    <div class="round-bar">
      <button class="nav-btn" id="btn-prev" onclick="navRound(-1)">◀</button>
      <div class="round-label" id="round-label">Loading…</div>
      <button class="nav-btn" id="btn-next" onclick="navRound(1)">▶</button>
      <button class="play-btn" id="play-btn" onclick="toggleCycle()">▶ Play</button>
      <span class="court-ind" id="court-ind"></span>
    </div>
    <div class="grid" id="grid"></div>
  </div>
</div>
<div class="status-bar"><div class="dot"></div><span id="status-txt">Connecting…</span></div>

<script>
let obsRound = 0;
let lastData = null;
let rafIds = {};
let cycleActive = false;
let cycleCourtIdx = 0;
let cycleTimer = null;

function parseNum(v){ const n=parseInt(v); return isNaN(n)?0:n; }

function extraForBase(baseIdx, extras){
  for(let i=0;i<4;i++) if(extras[i]&&extras[i].baseIndex===baseIdx) return i+16;
  return null;
}
function isAbsent(pi,r,ghosts,dropouts){
  return ghosts[pi]||(dropouts[pi]&&dropouts[pi][r]);
}
function isSlotAbsent(pi,r,ghosts,dropouts,extras){
  if(!isAbsent(pi,r,ghosts,dropouts)) return false;
  const eIdx=extraForBase(pi,extras);
  if(eIdx===null) return true;
  return !!(dropouts[eIdx]&&dropouts[eIdx][r]);
}
function isExtraAbsent(eIdx,r,dropouts){
  return !!(dropouts[eIdx]&&dropouts[eIdx][r]);
}
function getSlotScore(pi,r,rawBase,rawExtra,ghosts,dropouts,extras){
  const eIdx=extraForBase(pi,extras);
  if(eIdx===null) return parseNum(rawBase);
  const bOut=isAbsent(pi,r,ghosts,dropouts);
  const eOut=isExtraAbsent(eIdx,r,dropouts);
  const eMiss=rawExtra===''||rawExtra===undefined||rawExtra===null;
  if(bOut&&!eOut&&!eMiss) return parseNum(rawExtra);
  if(bOut) return 0;
  if(eOut||eMiss) return parseNum(rawBase);
  return Math.floor((parseNum(rawBase)+parseNum(rawExtra))/2);
}
function teamTotal(piA,piB,rawA,rawB,rawEA,rawEB,r,ghosts,dropouts,extras){
  const abA=isSlotAbsent(piA,r,ghosts,dropouts,extras);
  const abB=isSlotAbsent(piB,r,ghosts,dropouts,extras);
  if(abA&&abB) return 0;
  const sA=getSlotScore(piA,r,rawA,rawEA,ghosts,dropouts,extras);
  const sB=getSlotScore(piB,r,rawB,rawEB,ghosts,dropouts,extras);
  if(abA) return sB*2;
  if(abB) return sA*2;
  return sA+sB;
}
function effectivePot(numQ,ovr){
  return ovr!=null&&ovr>0?{max:ovr,base:ovr/2}:{max:numQ*4,base:numQ*2};
}
function calcBothPts(sA,sB,pot,base){
  const tpA=Math.min(Math.max(base+(sA-sB),0),pot);
  return {tpA,tpB:pot-tpA};
}

function exRaw(sc,k){ return sc&&sc[k]!==undefined&&sc[k]!==null&&sc[k]!==''?sc[k]:''; }

function courtSvgIcon(){
  return `<svg width="16" height="16" viewBox="0 0 18 18" fill="none" style="flex-shrink:0"><rect x="1" y="1" width="16" height="16" rx="2" stroke="white" stroke-width="1.5"/><line x1="1" y1="9" x2="17" y2="9" stroke="white" stroke-width="1"/><line x1="9" y1="1" x2="9" y2="17" stroke="white" stroke-width="1"/></svg>`;
}

function renderGrid(r, data, singleCourt=null){
  const {players,ghosts,extras,dropouts,schedule,scores,numQuestions,numQuestionsOverride} = data;
  if(!schedule[r]) { document.getElementById('grid').innerHTML='<div style="color:var(--muted);text-align:center;padding:2rem">No data for this round</div>'; return; }
  const {max:pot,base} = effectivePot(numQuestions, numQuestionsOverride);
  let html='';
  for(let c=0;c<4;c++){
    if(singleCourt!==null && c!==singleCourt) continue;
    const m=schedule[r][c];
    const sc=scores[r]?scores[r][c]:null;
    const [piA1,piA2,piB1,piB2]=[m.teamA[0],m.teamA[1],m.teamB[0],m.teamB[1]];
    const exA1=extraForBase(piA1,extras),exA2=extraForBase(piA2,extras);
    const exB1=extraForBase(piB1,extras),exB2=extraForBase(piB2,extras);
    const rEA1=exRaw(sc,'ea1'),rEA2=exRaw(sc,'ea2'),rEB1=exRaw(sc,'eb1'),rEB2=exRaw(sc,'eb2');
    const abA1=isSlotAbsent(piA1,r,ghosts,dropouts,extras),abA2=isSlotAbsent(piA2,r,ghosts,dropouts,extras);
    const abB1=isSlotAbsent(piB1,r,ghosts,dropouts,extras),abB2=isSlotAbsent(piB2,r,ghosts,dropouts,extras);
    const doA1=dropouts[piA1]&&dropouts[piA1][r],doA2=dropouts[piA2]&&dropouts[piA2][r];
    const doB1=dropouts[piB1]&&dropouts[piB1][r],doB2=dropouts[piB2]&&dropouts[piB2][r];
    const rawA1=abA1?0:(sc?sc.a1:''),rawA2=abA2?0:(sc?sc.a2:'');
    const rawB1=abB1?0:(sc?sc.b1:''),rawB2=abB2?0:(sc?sc.b2:'');
    const sA=teamTotal(piA1,piA2,rawA1,rawA2,rEA1,rEA2,r,ghosts,dropouts,extras);
    const sB=teamTotal(piB1,piB2,rawB1,rawB2,rEB1,rEB2,r,ghosts,dropouts,extras);
    const slotFill=(pi,raw)=>isSlotAbsent(pi,r,ghosts,dropouts,extras)||(raw!==''&&raw!==undefined);
    const aFilled=slotFill(piA1,rawA1)&&slotFill(piA2,rawA2);
    const bFilled=slotFill(piB1,rawB1)&&slotFill(piB2,rawB2);
    const allFilled=aFilled&&bFilled;
    const forcedDraw=allFilled&&((abA1&&abA2)||(abB1&&abB2)||(ghosts[piA1]&&doA2)||(ghosts[piA2]&&doA1)||(ghosts[piB1]&&doB2)||(ghosts[piB2]&&doB1));
    const {tpA,tpB}=allFilled?(forcedDraw?{tpA:base,tpB:base}:calcBothPts(sA,sB,pot,base)):{tpA:null,tpB:null};
    const aWin=allFilled&&!forcedDraw&&sA>sB,bWin=allFilled&&!forcedDraw&&sB>sA;
    const tpCA=aWin?'var(--win)':sA<sB&&allFilled?'var(--lose)':'var(--accent)';
    const tpCB=bWin?'var(--win)':sB<sA&&allFilled?'var(--lose)':'var(--accent)';
    const showX2A=(abA1||abA2)&&!(abA1&&abA2),showX2B=(abB1||abB2)&&!(abB1&&abB2);
    const dispScore=(pi,raw,rawEx,eIdx,abP)=>{
      if(ghosts[pi]) return '👻';
      if(abP) return 'OUT';
      if(raw===''||raw===undefined) return '—';
      return getSlotScore(pi,r,raw,rawEx,ghosts,dropouts,extras);
    };
    const scA1=dispScore(piA1,rawA1,rEA1,exA1,abA1),scA2=dispScore(piA2,rawA2,rEA2,exA2,abA2);
    const scB1=dispScore(piB1,rawB1,rEB1,exB1,abB1),scB2=dispScore(piB2,rawB2,rEB2,exB2,abB2);
    const exNameA1=exA1!==null?extras[exA1-16].name:'',exNameA2=exA2!==null?extras[exA2-16].name:'';
    const exNameB1=exB1!==null?extras[exB1-16].name:'',exNameB2=exB2!==null?extras[exB2-16].name:'';
    const exAbA1=exA1!==null&&isExtraAbsent(exA1,r,dropouts),exAbA2=exA2!==null&&isExtraAbsent(exA2,r,dropouts);
    const exAbB1=exB1!==null&&isExtraAbsent(exB1,r,dropouts),exAbB2=exB2!==null&&isExtraAbsent(exB2,r,dropouts);
    const prow=(name,exN,exAb,score,abP,isDo)=>`<div class="prow">
      <span class="pname${abP?' absent':''}">
        <span style="display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${name}${isDo?' <span style="font-size:0.6em;color:var(--lose)">(out)</span>':''}${exN&&!exAb?`<span style="font-size:0.6em;color:var(--accent);margin-left:2px">+${exN}</span>`:''}${exN&&exAb?`<span style="font-size:0.6em;color:var(--lose);margin-left:2px">+${exN}(out)</span>`:''}</span>
      </span>
      <span class="pscore">${score}</span>
    </div>`;
    const teamHtml=(side,p1,p2,exN1,exN2,exAb1,exAb2,sc1,sc2,ab1,ab2,do1,do2,total,filled,tp,tpC,showX2,isWin)=>`
      <div class="team" style="position:relative">
        ${isWin?`<div class="trophy">🏆</div><canvas class="confetti-canvas" id="conf-${c}-${side}"></canvas>`:''}
        <div style="position:relative;z-index:2">
          <div class="team-label">${side}</div>
          <div style="display:flex;flex-direction:column;gap:6%">
            ${prow(p1,exN1,exAb1,sc1,ab1,do1)}
            ${prow(p2,exN2,exAb2,sc2,ab2,do2)}
          </div>
        </div>
        <div style="position:relative;z-index:5">
          <div class="total-row">
            <span class="total-lbl">Total${showX2?' ×2':''}</span>
            <span class="total-val" style="color:${isWin?'var(--win)':bWin&&side==='Team A'||aWin&&side==='Team B'?'var(--lose)':'var(--text)'}">${filled?total:'—'}</span>
          </div>
          ${tp!==null?`<div class="pts" style="color:${tpC};position:relative;z-index:5">${tp} <span>PTS</span></div>`:''}
        </div>
      </div>`;
    const resultHtml=allFilled
      ?(forcedDraw?`<div class="result" style="color:var(--accent)">Forced Draw</div>`
        :aWin?`<div class="result" style="color:var(--win)">🏆 Team A Wins 🏆</div>`
        :bWin?`<div class="result" style="color:var(--win)">🏆 Team B Wins 🏆</div>`
        :`<div class="result" style="color:var(--accent)">Draw</div>`)
      :'';
    html+=`<div class="card">
      <div class="card-hdr">
        ${courtSvgIcon()}<span>Court ${c+1}</span>
        ${forcedDraw&&allFilled?`<span style="margin-left:auto;font-size:0.7em;color:var(--accent);opacity:0.8">Forced Draw</span>`:''}
      </div>
      <div class="card-body">
        ${teamHtml('Team A',players[piA1],players[piA2],exNameA1,exNameA2,exAbA1,exAbA2,scA1,scA2,abA1,abA2,doA1,doA2,sA,aFilled,tpA,tpCA,showX2A,aWin)}
        <div class="vs">VS</div>
        ${teamHtml('Team B',players[piB1],players[piB2],exNameB1,exNameB2,exAbB1,exAbB2,scB1,scB2,abB1,abB2,doB1,doB2,sB,bFilled,tpB,tpCB,showX2B,bWin)}
      </div>
      ${resultHtml}
    </div>`;
  }
  document.getElementById('grid').innerHTML=html;
  // Confetti
  Object.values(rafIds).forEach(id=>cancelAnimationFrame(id));
  rafIds={};
  document.querySelectorAll('.confetti-canvas').forEach(canvas=>{
    const ctx=canvas.getContext('2d');
    const W=canvas.offsetWidth||200,H=canvas.offsetHeight||200;
    canvas.width=W;canvas.height=H;
    const cols=['#00d4ff','#7c3aed','#27ae60','#e8b43a','#ffffff','#f472b6'];
    const pieces=Array.from({length:60},()=>({x:Math.random()*W,y:Math.random()*H-H,vx:(Math.random()-0.5)*2,vy:Math.random()*3+1,c:cols[Math.floor(Math.random()*cols.length)],w:Math.random()*8+3,h:Math.random()*4+2,r:Math.random()*360}));
    function tick(){
      ctx.clearRect(0,0,W,H);
      pieces.forEach(p=>{
        p.y+=p.vy;p.x+=p.vx;p.r+=2;
        if(p.y>H){p.y=-10;p.x=Math.random()*W;}
        ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.r*Math.PI/180);
        ctx.fillStyle=p.c;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();
      });
      rafIds[canvas.id]=requestAnimationFrame(tick);
    }
    rafIds[canvas.id]=requestAnimationFrame(tick);
  });
}

function navRound(delta){
  obsRound=Math.max(0,Math.min(14,obsRound+delta));
  localStorage.setItem('rr_obs_round',obsRound);
  if(lastData) render();
}

function render(){
  const data=lastData;
  document.getElementById('round-label').textContent=`Round ${obsRound+1} of 15`;
  document.getElementById('btn-prev').disabled=obsRound===0;
  document.getElementById('btn-next').disabled=obsRound===14;
  renderGrid(obsRound,data,cycleActive?cycleCourtIdx:null);
}

function startCycle(){
  cycleActive=true;
  cycleCourtIdx=0;
  document.getElementById('play-btn').textContent='⏹ Stop';
  document.getElementById('grid').classList.add('single');
  const ind=document.getElementById('court-ind');
  ind.style.display='';
  ind.textContent='Court 1 / 4';
  if(lastData) renderGrid(obsRound,lastData,0);
  cycleTimer=setInterval(()=>{
    cycleCourtIdx=(cycleCourtIdx+1)%4;
    document.getElementById('court-ind').textContent=`Court ${cycleCourtIdx+1} / 4`;
    if(lastData) renderGrid(obsRound,lastData,cycleCourtIdx);
  },3000);
}

function stopCycle(){
  cycleActive=false;
  clearInterval(cycleTimer);
  cycleTimer=null;
  document.getElementById('play-btn').textContent='▶ Play';
  document.getElementById('grid').classList.remove('single');
  document.getElementById('court-ind').style.display='none';
  if(lastData) renderGrid(obsRound,lastData,null);
}

function toggleCycle(){
  if(cycleActive) stopCycle(); else startCycle();
}

function load(){
  try{
    const rawP=localStorage.getItem('rr_players');
    const rawGen=localStorage.getItem('rr_generated');

    if(!rawP){
      document.getElementById('grid').innerHTML='<div style="color:var(--muted);text-align:center;padding:2rem;font-size:1.2rem">Waiting for data…<br><span style="font-size:0.8rem">Open the main app in the same browser first.</span></div>';
      document.getElementById('status-txt').textContent='No data in localStorage';
      return;
    }
    if(rawGen!=='1'){
      document.getElementById('grid').innerHTML='<div style="color:var(--muted);text-align:center;padding:2rem;font-size:1.2rem">Tournament not generated yet.<br><span style="font-size:0.8rem">Click Generate Tournament in the main app.</span></div>';
      document.getElementById('status-txt').textContent='Tournament not generated';
      return;
    }

    const rawGh=localStorage.getItem('rr_ghosts');
    const rawEx=localStorage.getItem('rr_extras');
    const rawDo=localStorage.getItem('rr_dropouts');
    const rawSc=localStorage.getItem('rr_schedule');
    const rawScores=localStorage.getItem('rr_scores');
    const rawQ=localStorage.getItem('rr_questions');
    const rawOv=localStorage.getItem('rr_override');
    const rawOr=localStorage.getItem('rr_obs_round');

    if(!rawSc){
      document.getElementById('status-txt').textContent='No schedule data';
      return;
    }

    if(rawOr!==null){
      const nr=parseInt(rawOr)||0;
      if(nr!==obsRound){ obsRound=nr; }
    }

    const parsedDo=rawDo?JSON.parse(rawDo):null;
    lastData={
      players:JSON.parse(rawP),
      ghosts:rawGh?JSON.parse(rawGh):Array(16).fill(false),
      extras:rawEx?JSON.parse(rawEx):[null,null,null,null],
      dropouts:parsedDo?Array.from({length:20},function(_,i){return Array.from({length:15},function(_,r){return !!(parsedDo[i]&&parsedDo[i][r]);});}):Array.from({length:20},function(){return Array(15).fill(false);}),
      schedule:JSON.parse(rawSc),
      scores:rawScores?JSON.parse(rawScores):{},
      numQuestions:parseInt(rawQ)||10,
      numQuestionsOverride:rawOv?parseInt(rawOv)||null:null,
    };
    render();
    document.getElementById('status-txt').textContent='Live · '+new Date().toLocaleTimeString();
  }catch(e){
    console.error('OBS overlay error:', e);
    document.getElementById('status-txt').textContent='Error: '+e.message;
    document.getElementById('grid').innerHTML='<div style="color:var(--lose);text-align:center;padding:2rem;font-size:0.9rem">Error loading data:<br>'+e.message+'<br><span style="font-size:0.75rem;color:var(--muted)">Check browser console for details</span></div>';
  }
}

load();
setInterval(load,2000);
</script>
